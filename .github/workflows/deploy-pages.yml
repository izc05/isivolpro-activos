name: Deploy GitHub Pages

# Builds the Vite application and publishes the generated site to the
# repository root. GitHub Pages is configured to deploy from the main branch.
on:
  push:
    branches:
      - main
  workflow_dispatch:

permissions:
  contents: write

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Install dependencies
        run: npm install

      - name: Restore source HTML
        run: cp index.source.html index.html

      - name: Build
        run: npm run build
        env:
          GITHUB_PAGES: 'true'
          VITE_SUPABASE_URL: ${{ vars.VITE_SUPABASE_URL }}
          VITE_SUPABASE_ANON_KEY: ${{ vars.VITE_SUPABASE_ANON_KEY }}
          VITE_ENABLE_DEMO_SIGNUP: ${{ vars.VITE_ENABLE_DEMO_SIGNUP || 'false' }}

      - name: Synchronize built site with repository root
        if: github.event_name == 'push' && !contains(github.event.head_commit.message, '[pages-build]')
        run: |
          rm -rf assets
          cp -R dist/assets ./assets
          cp dist/index.html ./index.html

          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add index.html assets

          if git diff --cached --quiet; then
            echo "The published files are already current."
          else
            git commit -m "chore: publish current application [pages-build]"
            git push origin HEAD:main
          fi

      - name: Skip Actions Pages deploy
        run: echo "Pages deploy is handled by the repository branch source."
